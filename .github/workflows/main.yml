name: Build HitVaultV2 (Fastlane)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  ios:
    runs-on: macos-15
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Setup Xcode 16.2
      run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
        
    - name: Install dependencies
      run: npm install
      
    - name: Disable Asset Symbols (Hard Fix via sed)
      run: |
        cd ios
        find . -name "*.pbxproj" -exec sed -i '' 's/ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS = YES;/ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS = NO;/g' {} +
        find . -name "*.pbxproj" -exec sed -i '' 's/ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS = YES;/ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS = NO;/g' {} +
      
    - name: Hard-Reset LaunchScreen.storyboard
      run: |
        # Schreibt ein nacktes, 100% fehlerfreies Storyboard ohne 18.2-Abhängigkeit
        cat << 'EOF' > ios/HitVaultV2/LaunchScreen.storyboard
        <?xml version="1.0" encoding="UTF-8"?>
        <document type="com.apple.InterfaceBuilder3.CocoaTouch.Storyboard.XIB" version="3.0" toolsVersion="21507" targetRuntime="iOS.CocoaTouch" propertyAccessControl="none" useAutolayout="YES" launchScreen="YES" useTraitCollections="YES" useSafeAreas="YES" colorMatched="YES" initialViewController="01J-lp-oVM">
            <device id="retina4_7" orientation="portrait" appearance="light"/>
            <dependencies>
                <deployment identifier="iOS"/>
                <plugIn identifier="com.apple.InterfaceBuilder.IBCocoaTouchPlugin" version="21505"/>
                <capability name="Safe area layout guides" minToolsVersion="9.0"/>
                <capability name="documents saved in the Xcode 8 format" minToolsVersion="8.0"/>
            </dependencies>
            <scenes>
                <scene sceneID="EHf-IW-A2E">
                    <objects>
                        <viewController id="01J-lp-oVM" sceneMemberID="viewController">
                            <view key="view" contentMode="scaleToFill" id="Ze5-6b-2t3">
                                <rect key="frame" x="0.0" y="0.0" width="375" height="667"/>
                                <autoresizingMask key="autoresizingMask" widthSizable="YES" heightSizable="YES"/>
                                <viewLayoutGuide key="safeArea" id="Bcu-3y-fUS"/>
                                <color key="backgroundColor" red="1" green="1" blue="1" alpha="1" colorSpace="custom" customColorSpace="sRGB"/>
                            </view>
                        </viewController>
                        <placeholder placeholderIdentifier="IBFirstResponder" id="iYj-Kq-Ea1" userLabel="First Responder" sceneMemberID="firstResponder"/>
                    </objects>
                </scene>
            </scenes>
        </document>
        EOF

    - name: Install CocoaPods
      run: |
        cd ios
        pod install --repo-update
        
    - name: Install Fastlane
      run: gem install fastlane
      
    - name: Build iOS App with Fastlane (Failsafe)
      run: |
        cd ios
        fastlane gym \
          --workspace HitVaultV2.xcworkspace \
          --scheme HitVaultV2 \
          --configuration Release \
          --export_method ad-hoc \
          --skip_package_ipa true \
          --skip_profile_detection true \
          --skip_codesigning true \
          --xcargs "CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY='' COMPILER_INDEX_STORE_ENABLE=NO SWIFT_OPTIMIZATION_LEVEL='-Onone'"
          
    - name: Create IPA (Manual Packaging)
      run: |
        cd ios
        mkdir -p Payload
        APP_PATH=$(find . -name "HitVaultV2.app" -type d | head -n 1)
        
        if [ -z "$APP_PATH" ]; then
          echo "❌ FEHLER: Keine .app Datei gefunden!"
          exit 1
        fi
        
        cp -r "$APP_PATH" Payload/
        zip -r HitVaultV2.ipa Payload/
        
    - name: Upload iOS IPA
      uses: actions/upload-artifact@v4
      with:
        name: hitvault-ios-ipa
        path: ios/HitVaultV2.ipa
        retention-days: 7
