name: Build HitVaultV2

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  ios:
    runs-on: macos-15
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Setup Xcode 16.2
      run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
        
    - name: Install dependencies
      run: npm install
      
    - name: Ultimate Podfile Patch (Fix für Asset Symbols und Swift)
      run: |
        cd ios
        node -e "
          const fs = require('fs');
          if (fs.existsSync('Podfile')) {
            let podfile = fs.readFileSync('Podfile', 'utf8');
            const injectCode = \`
              installer.pods_project.targets.each do |target|
                target.build_configurations.each do |config|
                  config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                  config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
                  config.build_settings['CODE_SIGN_IDENTITY'] = ''
                  config.build_settings['EXPANDED_CODE_SIGN_IDENTITY'] = ''
                  
                  # Unterdrücke alle Swift/Header Fehler
                  config.build_settings['GCC_TREAT_WARNINGS_AS_ERRORS'] = 'NO'
                  config.build_settings['SWIFT_OPTIMIZATION_LEVEL'] = '-Onone'
                  config.build_settings['GCC_OPTIMIZATION_LEVEL'] = '0'
                  
                  # Verbietet Xcode 16 die generierung von GeneratedAssetSymbols.swift
                  config.build_settings['ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS'] = 'NO'
                  config.build_settings['ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS'] = 'NO'
                end
              end
            \`;
            if (podfile.includes('post_install do |installer|')) {
              podfile = podfile.replace('post_install do |installer|', 'post_install do |installer|\\n' + injectCode);
              fs.writeFileSync('Podfile', podfile);
              console.log('✅ Podfile gepatched: Xcode 16 Asset Symbols deaktiviert!');
            }
          }
        "
      
    - name: Install CocoaPods
      run: |
        cd ios
        pod install --repo-update
        
    - name: Build iOS App
      run: |
        cd ios
        
        # Build command with disabled Asset Symbols directly in arguments
        xcodebuild clean build \
                   -workspace HitVaultV2.xcworkspace \
                   -scheme HitVaultV2 \
                   -configuration Release \
                   -sdk iphoneos \
                   -derivedDataPath ./build \
                   CODE_SIGNING_REQUIRED=NO \
                   CODE_SIGNING_ALLOWED=NO \
                   ENABLE_BITCODE=NO \
                   ONLY_ACTIVE_ARCH=NO \
                   COMPILER_INDEX_STORE_ENABLE=NO \
                   ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS=NO \
                   ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS=NO \
                   SWIFT_OPTIMIZATION_LEVEL="-Onone"
                   
    - name: Create IPA
      run: |
        cd ios
        mkdir -p Payload
        
        APP_PATH=$(find ./build -name "*.app" -type d | head -n 1)
        
        if [ -z "$APP_PATH" ]; then
          echo "❌ FEHLER: Keine .app Datei gefunden!"
          exit 1
        fi
        
        cp -r "$APP_PATH" Payload/
        zip -r HitVaultV2.ipa Payload/
        
    - name: Upload iOS IPA
      uses: actions/upload-artifact@v4
      with:
        name: hitvault-ios-ipa
        path: ios/HitVaultV2.ipa
        retention-days: 7
