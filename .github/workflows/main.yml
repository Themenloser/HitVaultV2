name: Build HitVaultV2 (Fastlane)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  ios:
    runs-on: macos-15
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Setup Xcode 16.2
      run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
        
    - name: Install dependencies
      run: npm install
      
    - name: Fix Xcode Project Settings (Asset Symbols & Deployment Target)
      run: |
        cd ios
        # Asset-Generierung abschalten, wie gehabt
        find . -name "*.pbxproj" -exec sed -i '' 's/ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS = YES;/ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS = NO;/g' {} +
        find . -name "*.pbxproj" -exec sed -i '' 's/ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS = YES;/ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS = NO;/g' {} +
        
        # NEU: Wir lösen die feste Abhängigkeit zu iOS 18.2 und setzen ein kompatibles Ziel
        find . -name "*.pbxproj" -exec sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 18.2;/IPHONEOS_DEPLOYMENT_TARGET = 16.0;/g' {} +
        find . -name "*.pbxproj" -exec sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 18.0;/IPHONEOS_DEPLOYMENT_TARGET = 16.0;/g' {} +
        
        # NEU: LaunchScreen.storyboard Version sicher anpassen (ohne es zu löschen)
        find . -name "LaunchScreen.storyboard" -exec sed -i '' 's/version="[0-9]*"/version="21507"/g' {} +
        find . -name "LaunchScreen.storyboard" -exec sed -i '' 's/minToolsVersion="[0-9]*\.[0-9]*"/minToolsVersion="9.0"/g' {} +
      
    - name: Install CocoaPods
      run: |
        cd ios
        pod install --repo-update
        
    - name: Install Fastlane
      run: gem install fastlane
      
    - name: Build iOS App with Fastlane
      run: |
        cd ios
        fastlane gym \
          --workspace HitVaultV2.xcworkspace \
          --scheme HitVaultV2 \
          --configuration Release \
          --export_method ad-hoc \
          --skip_package_ipa true \
          --skip_profile_detection true \
          --skip_codesigning true \
          --xcargs "CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY='' COMPILER_INDEX_STORE_ENABLE=NO SWIFT_OPTIMIZATION_LEVEL='-Onone' SDKROOT=iphoneos"
          
    - name: Create IPA (Manual Packaging)
      run: |
        cd ios
        mkdir -p Payload
        APP_PATH=$(find . -name "HitVaultV2.app" -type d | head -n 1)
        
        if [ -z "$APP_PATH" ]; then
          echo "❌ FEHLER: Keine .app Datei gefunden!"
          exit 1
        fi
        
        cp -r "$APP_PATH" Payload/
        zip -r HitVaultV2.ipa Payload/
        
    - name: Upload iOS IPA
      uses: actions/upload-artifact@v4
      with:
        name: hitvault-ios-ipa
        path: ios/HitVaultV2.ipa
        retention-days: 7
