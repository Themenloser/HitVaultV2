name: Build HitVaultV2 (Fastlane)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  ios:
    runs-on: macos-15
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Setup Xcode 16.2
      run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
      
    - name: Install Missing iOS 18.2 SDK
      run: |
        # Dies behebt den "iOS 18.2 Platform Not Installed" Fehler auf GitHub Actions
        # Es lädt die Plattform-Dateien runter, die der Xcode-Compiler für das Storyboard braucht.
        xcodebuild -downloadPlatform iOS -buildVersion 22C150 || true
        xcodebuild -runFirstLaunch
        
    - name: Install dependencies
      run: npm install
      
    - name: Disable Asset Symbols (Hard Fix via sed)
      run: |
        cd ios
        find . -name "*.pbxproj" -exec sed -i '' 's/ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS = YES;/ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS = NO;/g' {} +
        find . -name "*.pbxproj" -exec sed -i '' 's/ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS = YES;/ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS = NO;/g' {} +
      
    - name: Install CocoaPods
      run: |
        cd ios
        pod install --repo-update
        
    - name: Install Fastlane
      run: gem install fastlane
      
    - name: Build iOS App with Fastlane
      run: |
        cd ios
        fastlane gym \
          --workspace HitVaultV2.xcworkspace \
          --scheme HitVaultV2 \
          --configuration Release \
          --export_method ad-hoc \
          --skip_package_ipa true \
          --skip_profile_detection true \
          --skip_codesigning true \
          --xcargs "CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY='' COMPILER_INDEX_STORE_ENABLE=NO SWIFT_OPTIMIZATION_LEVEL='-Onone'"
          
    - name: Create IPA (Manual Packaging)
      run: |
        cd ios
        mkdir -p Payload
        APP_PATH=$(find . -name "HitVaultV2.app" -type d | head -n 1)
        
        if [ -z "$APP_PATH" ]; then
          echo "❌ FEHLER: Keine .app Datei gefunden!"
          exit 1
        fi
        
        cp -r "$APP_PATH" Payload/
        zip -r HitVaultV2.ipa Payload/
        
    - name: Upload iOS IPA
      uses: actions/upload-artifact@v4
      with:
        name: hitvault-ios-ipa
        path: ios/HitVaultV2.ipa
        retention-days: 7
