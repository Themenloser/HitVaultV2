name: Build HitVaultV2 (Fastlane)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  ios:
    runs-on: macos-15
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Setup Xcode 16.2
      run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
      
    - name: Download iOS 18.2 Platform (GitHub Workaround)
      run: |
        xcodebuild -downloadPlatform iOS -buildVersion 22C150
        
    - name: Install dependencies
      run: npm install
      
    - name: Fix Xcode Project Settings
      run: |
        cd ios
        find . -name "*.pbxproj" -exec sed -i '' 's/ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS = YES;/ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS = NO;/g' {} +
        find . -name "*.pbxproj" -exec sed -i '' 's/ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS = YES;/ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS = NO;/g' {} +
      
    - name: Install CocoaPods
      run: |
        cd ios
        pod install --repo-update
        
    - name: Install Fastlane
      run: gem install fastlane
      
    - name: Build iOS App with Fastlane
      run: |
        cd ios
        fastlane gym \
          --workspace HitVaultV2.xcworkspace \
          --scheme HitVaultV2 \
          --configuration Release \
          --export_method ad-hoc \
          --skip_package_ipa true \
          --skip_profile_detection true \
          --skip_codesigning true \
          --xcargs "CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY='' COMPILER_INDEX_STORE_ENABLE=NO SWIFT_OPTIMIZATION_LEVEL='-Onone'"
          
    - name: Create IPA
      run: |
        cd ios
        # Wir lassen Fastlane die IPA direkt aus dem erfolgreichen Archiv exportieren
        fastlane gym \
          --workspace HitVaultV2.xcworkspace \
          --scheme HitVaultV2 \
          --configuration Release \
          --export_method ad-hoc \
          --skip_build_archive true \
          --output_directory ./ \
          --output_name HitVaultV2.ipa \
          --xcargs "CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=''"
        
    - name: Upload iOS IPA
      uses: actions/upload-artifact@v4
      with:
        name: hitvault-ios-ipa
        path: ios/HitVaultV2.ipa
        retention-days: 7

    - name: Upload Xcode Logs on Failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: xcode-build-logs
        path: /Users/runner/Library/Logs/gym/
        retention-days: 3
