name: Build HitVaultV2

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm install
      
    - name: Build Android APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleRelease
        
    - name: Upload Android APK
      uses: actions/upload-artifact@v4
      with:
        name: hitvault-android-apk
        path: android/app/build/outputs/apk/release/app-release.apk
        retention-days: 7

  ios:
    runs-on: macos-15
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Setup Xcode 16.2
      run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
        
    - name: Install dependencies
      run: npm install
      
    - name: Install CocoaPods
      run: |
        cd ios
        pod install --repo-update
        
    - name: Build iOS App
      run: |
        cd ios
        # Ein sauberer xcodebuild Befehl, ohne Podfile-Ruby-Hacks, 
        # da Windsurf das Projekt intern repariert hat.
        xcodebuild clean build \
                   -workspace HitVaultV2.xcworkspace \
                   -scheme HitVaultV2 \
                   -configuration Release \
                   -sdk iphoneos \
                   -derivedDataPath ./build \
                   CODE_SIGNING_REQUIRED=NO \
                   CODE_SIGNING_ALLOWED=NO \
                   ENABLE_BITCODE=NO \
                   ONLY_ACTIVE_ARCH=NO
                   
    - name: Create IPA
      run: |
        cd ios
        mkdir -p Payload
        
        APP_PATH=$(find ./build -name "*.app" -type d | head -n 1)
        
        if [ -z "$APP_PATH" ]; then
          echo "❌ FEHLER: Keine .app Datei gefunden!"
          exit 1
        fi
        
        cp -r "$APP_PATH" Payload/
        zip -r HitVaultV2.ipa Payload/
        
    - name: Upload iOS IPA
      uses: actions/upload-artifact@v4
      with:
        name: hitvault-ios-ipa
        path: ios/HitVaultV2.ipa
        retention-days: 7
