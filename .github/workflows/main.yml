name: Build iOS App (Smart Auto-Detect)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-15 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Install dependencies
        run: npm install

      - name: Check Project Type & Prepare
        run: |
          if grep -q '"expo"' package.json; then
            echo "🚀 Expo Projekt erkannt! Führe Prebuild aus..."
            npx expo prebuild --platform ios --clean
          else
            echo "⚛️ Reines React Native Projekt erkannt! Gehe direkt zum iOS Ordner..."
          fi

      - name: Install CocoaPods (mit Fix für Swift Compile Error)
        run: |
          cd ios
          
          # Patch für fehlende Zertifikate UND Swift-Compiler-Crashes
          node -e "
            const fs = require('fs');
            if (fs.existsSync('Podfile')) {
              let podfile = fs.readFileSync('Podfile', 'utf8');
              const injectCode = \`
                installer.pods_project.targets.each do |target|
                  target.build_configurations.each do |config|
                    # 1. Ignoriere Apple-Accounts
                    config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                    config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
                    config.build_settings['CODE_SIGN_IDENTITY'] = ''
                    config.build_settings['EXPANDED_CODE_SIGN_IDENTITY'] = ''
                    
                    # 2. Ignoriere fehlende Header
                    config.build_settings['GCC_TREAT_WARNINGS_AS_ERRORS'] = 'NO'
                    
                    # 3. DAS IST DER FIX FÜR DEN 'SwiftCompile failed' FEHLER!
                    # Zwingt Xcode, den Code nicht zu optimieren, was den Absturz verhindert.
                    config.build_settings['SWIFT_OPTIMIZATION_LEVEL'] = '-Onone'
                    config.build_settings['SWIFT_COMPILATION_MODE'] = 'singlefile'
                    config.build_settings['SWIFT_STRICT_CONCURRENCY'] = 'minimal'
                  end
                end
              \`;
              if (podfile.includes('post_install do |installer|')) {
                podfile = podfile.replace('post_install do |installer|', 'post_install do |installer|\\n' + injectCode);
                fs.writeFileSync('Podfile', podfile);
                console.log('✅ Podfile gepatched (Swift Fix inkludiert)!');
              }
            }
          "
          
          pod install --repo-update

      - name: Build iOS App
        run: |
          cd ios
          WORKSPACE=$(ls | grep .xcworkspace | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          
          # Führe den Release Build aus, aber zwinge Swift zur Stabilität
          xcodebuild clean build \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            GCC_TREAT_WARNINGS_AS_ERRORS=NO \
            SWIFT_OPTIMIZATION_LEVEL="-Onone" \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Package IPA
        run: |
          cd ios
          APP_PATH=$(find build -name "*.app" -type d | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "❌ FEHLER: Keine .app Datei generiert!"
            exit 1
          fi
          
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r app.ipa Payload/

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hitvault-v2-ios-ipa
          path: ios/app.ipa
          retention-days: 7
